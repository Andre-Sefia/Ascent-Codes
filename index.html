<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ascent</title>

    <!-- QUICK CSS -->
     <style>
        .home { display: none; }
        .loadingPage { display: none; }
    </style>

    <link rel="stylesheet" href="syntax.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>


<body>
<!-- THE CODE -->
<div class="firstCover" id="firstCover">
    <div class="code" id="code">
        <video src="media/Can you see it.mov" autoplay muted playsinline class="videoCode" id="introVideo">
        </video>
    </div>
</div>

<!--LOADING PAGE-->
<div class="loadingPage" id="loading" style="display: none;">

    <div class="shadow">
        <div class="load">

        </div>
        
        <span>Ascending...</span>

    </div>

</div>


<!-- FRONT PAGE -->
    <div class="home" id="home">
        <div class="cover">
            <video autoplay muted loop playsinline class="backgroundClip">
                <source src="https://res.cloudinary.com/dat67gcxl/video/upload/q_auto,f_auto/v1781826695/Horizontal_Background_uu4a4z.mp4">
            </video>

            <video autoplay muted loop playsinline class="backgroundClipMobile">
                <source src="https://res.cloudinary.com/dat67gcxl/video/upload/q_auto,f_auto/v1781826700/Vertical_Background_khmazw.mp4">
            </video>


            <div class="logo">
                <div class="ascent">
                    <img src="media/IMG_1767.png" alt="The Ascent">
                </div>

                <div class="welcome">
                    <p>Welcome</p>
                </div>

            </div>

            <div class="scroll">
                <i class="fa-solid fa-angles-down"></i>
                <p>Scroll</p>
            </div>

        </div>


        <!-- IDENTITIES -->
        <div class="identityContainer">
            <div class="identity">
                <img src="media/The Explorer.jpg" alt="">
                <p>The Explorer</p>
            </div>
            <div class="identity">
                <img src="media/The Observer.jpg" alt="">
                <p>The Observer</p>
            </div>
            <div class="identity">
                <img src="media/The Enigma.jpg" alt="">
                <p>The Enigma</p>
            </div>
            <div class="identity">
                <img src="media/The connector.jpg" alt="">
                <p>The Connector</p>
            </div>
            <div class="identity">
                <img src="media/The Unavailable.jpg" alt="">
                <p>The Unavailable</p>
            </div>
            <div class="identity">
                <img src="media/The Baddie.png" alt="">
                <p>The Baddie</p>
            </div>
            <div class="identity">
                <img src="media/The Nonchalant.png" alt="">
                <p>The Nonchalant</p>
            </div>
            <div class="identity">
                <img src="media/The Muse.png" alt="">
                <p>The Muse</p>
            </div>
        </div>


        <!-- ACCESS BUTTON -->
        <div class="access">
            <a href="https://form.typeform.com/to/QsXfdgVd" id="granted">
                Request Access
            </a>
        </div>
    </div>

    
</body>
<script src="script.js"></script>

</html>
